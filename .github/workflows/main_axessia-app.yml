name: Build and deploy Node app to Azure Web App - axessia-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── Frontend build ───────────────────────────────────────────────────
      - name: Install frontend deps
        working-directory: frontend
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build frontend (Vite)
        working-directory: frontend
        run: npm run build

      - name: Verify frontend build
        run: |
          test -f frontend/dist/index.html
          ls -la frontend/dist

      # ── Backend build ────────────────────────────────────────────────────
      - name: Install backend deps
        working-directory: backend
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build backend (tsc)
        working-directory: backend
        run: npm run build

      - name: Verify backend build
        run: |
          test -f backend/dist/index.js
          ls backend/dist

      # ── Package the deploy zip ───────────────────────────────────────────
      # NOTE: we include backend/node_modules in the deploy zip so the App
      # Service container does NOT need to npm install on boot. This avoids
      # the native-compile flakiness and cuts cold-start time from 5min to ~30s.
      - name: Create deployment package
        run: |
          zip -qr release.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "frontend/node_modules/*" \
            -x "frontend/src/*" \
            -x "frontend/index.html" \
            -x "frontend/tsconfig.json" \
            -x "frontend/vite.config.ts" \
            -x "frontend/tailwind.config.js" \
            -x "frontend/postcss.config.js" \
            -x "backend/src/*" \
            -x "backend/tsconfig.json" \
            -x "backend/data/*" \
            -x ".env" \
            -x "backend/.env" \
            -x "*.sqlite*" \
            -x "*.db"
          echo "Deploy zip size: $(du -h release.zip | cut -f1)"

      # ── Azure deploy ─────────────────────────────────────────────────────
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZUREAPPSERVICE_CLIENTID_2B7F8A68563540588D2B9FCDDE24980F }}
          tenant-id:       ${{ secrets.AZUREAPPSERVICE_TENANTID_8ED8A0C152054104A26BD00F1B5AE9E3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AFB2DB03E1CD43C295D6E3C5CB7EB2AF }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name:  axessia-app
          slot-name: Production
          package:   release.zip
