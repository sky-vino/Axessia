# Build and deploy Node.js app to Azure Web App - axessia-app
name: Build and deploy Node.js app to Azure Web App - axessia-app
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Build backend (install + compile TypeScript)
        run: |
          cd backend
          npm ci
          npm run build

      - name: Build frontend (install + bundle)
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F3859744C07C48A3B6EADD10D9F81C96 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CECA326C6C9946929168372173AB4A07 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D504AF1AA1EC4977A908FD96A13E29F8 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'axessia-app'
          slot-name: 'Production'
          package: .
