name: Build and deploy Node.js app to Azure Web App - axessia-app

on:
  push:
    branches:
      - test-fix-branch
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      # ---- Backend: install (compile sqlite3 from source), build, prune ----
      - name: Install backend dependencies (compile sqlite3 from source)
        working-directory: ./backend
        run: npm install --no-audit --no-fund --build-from-source=sqlite3

      - name: Build backend (TypeScript)
        working-directory: ./backend
        run: npm run build

      - name: Prune backend devDependencies
        working-directory: ./backend
        run: npm prune --omit=dev

      # ---- Frontend: install, build ----
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install --no-audit --no-fund

      - name: Build frontend (Vite)
        working-directory: ./frontend
        run: npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            backend/dist
            backend/node_modules
            backend/package.json
            backend/migrations
            frontend/dist
            startup.sh

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_19EFDF7EE8A94E6F8D55E9E5F31959BB }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F3B178FB44F84035A929B8A87FA47196 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DCA5BF726DBE48DD870DADA3C06143FA }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'axessia-app'
          slot-name: 'Production'
          package: .
